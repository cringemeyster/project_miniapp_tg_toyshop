services:
  db:
    image: postgres:16
    container_name: toyshop_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    container_name: toyshop_api
    env_file:
      - ./.env
    depends_on:
      - db
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - uploads_data:/app/uploads

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_MASTER_ID: ${VITE_MASTER_ID:-123456789}
    container_name: toyshop_web
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - api

volumes:
  pgdata:
  uploads_data:
